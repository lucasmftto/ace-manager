<div class="list-page">

  <div class="list-topbar">
    <span class="list-title">Planos & Pacotes</span>
    <span class="total-hint" *ngIf="!loading">{{ total }} plano(s)</span>
    <span style="flex:1"></span>
    <button mat-raised-button color="primary" (click)="goToNew()">
      <mat-icon>add</mat-icon> Novo plano
    </button>
  </div>

  @if (loading) {
    <div class="loading-state"><mat-spinner diameter="40"></mat-spinner></div>
  } @else {
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let p">
            <span class="plan-name" (click)="goToDetail(p.id)">{{ p.name }}</span>
            <span class="plan-desc" *ngIf="p.description">{{ p.description }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Tipo</th>
          <td mat-cell *matCellDef="let p">
            <mat-chip [class]="'type-chip type-' + p.type.toLowerCase()">{{ typeLabels[p.type] }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="referencePrice">
          <th mat-header-cell *matHeaderCellDef>Preço ref.</th>
          <td mat-cell *matCellDef="let p">{{ p.referencePrice | currency:'BRL':'symbol':'1.2-2' }}</td>
        </ng-container>

        <ng-container matColumnDef="details">
          <th mat-header-cell *matHeaderCellDef>Detalhes</th>
          <td mat-cell *matCellDef="let p">{{ planDetails(p) }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let p">
            <mat-chip [class]="'status-chip status-' + p.status.toLowerCase()">{{ statusLabels[p.status] }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button (click)="goToEdit(p.id)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-state" [attr.colspan]="displayedColumns.length">Nenhum plano cadastrado.</td>
        </tr>
      </table>
    </div>
  }
</div>

<style>
  .list-page { padding: 24px; }
  .list-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    .list-title { font-size: 22px; font-weight: 600; }
    .total-hint { font-size: 14px; color: #666; }
  }
  .loading-state { display: flex; justify-content: center; padding: 64px; }
  .table-container { overflow-x: auto; }
  .plan-name { font-weight: 500; color: var(--color-primary); cursor: pointer; display: block;
    &:hover { text-decoration: underline; } }
  .plan-desc { font-size: 12px; color: #999; display: block; }
  .type-chip { font-size: 11px !important;
    &.type-monthly  { background: #e8f5e9 !important; color: #2e7d32 !important; }
    &.type-bundle   { background: #e3f2fd !important; color: #1565c0 !important; }
    &.type-drop_in  { background: #fff3e0 !important; color: #e65100 !important; }
    &.type-group    { background: #f3e5f5 !important; color: #6a1b9a !important; }
  }
  .status-chip { font-size: 12px;
    &.status-active   { background: #e8f5e9; color: #2e7d32; }
    &.status-inactive { background: #fafafa; color: #757575; }
  }
  .empty-state { text-align: center; padding: 48px; color: #999; }
</style>
