services:
  postgres:
    image: postgres:16-alpine
    container_name: acemanager-postgres
    environment:
      POSTGRES_DB: acemanager
      POSTGRES_USER: acemanager
      POSTGRES_PASSWORD: acemanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
